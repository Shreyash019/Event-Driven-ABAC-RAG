name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  affected:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so `nx affected` can diff against origin/main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup uv (Python)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Sync Python workspace
        run: uv sync

      - name: Nx affected (lint, test, build)
        run: pnpm nx affected -t lint test build --base=origin/main
