services:
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant_data:/qdrant/storage"]

  redis:
    image: redis:latest
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]

  # --- application services -------------------------------------------------

  auth-service: # Nest.js — login, token issue/refresh, JWKS
    build:
      context: ../..
      dockerfile: apps/services/auth-service/Dockerfile
    # Secrets (RS256 key, seed passwords) come from a git-ignored env file, never the
    # committed compose (GUARDRAILS §5.1). Copy apps/services/auth-service/.env.example
    # to apps/services/auth-service/.env and fill it in.
    env_file:
      - ../../apps/services/auth-service/.env
    environment:
      PORT: "3000"
    ports: ["4000:3000"] # host 4000 -> container 3000 (avoids clash with mainapp)
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-redis:
        condition: service_started
    restart: unless-stopped

  auth-postgres: # Postgres — auth-service user store. Local dev creds only; this compose
    image: postgres:16-alpine #  is dev-only and MUST NOT be deployed as-is (GUARDRAILS §5.4).
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: authpass # matches DATABASE_URL in auth-service/.env
      POSTGRES_DB: auth
    volumes: ["auth_pg_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  auth-redis: # Redis — auth-service refresh-token sessions (dedicated, NOT the ingestion broker)
    image: redis:7-alpine
    volumes: ["auth_redis_data:/data"]
    restart: unless-stopped

  ingestion-retrieval-service: # Python — async ingestion consumer + retrieval
    build:
      context: ../..
      dockerfile: apps/services/ingestion-retrieval-service/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
    depends_on: [redis, qdrant]
    restart: unless-stopped

  rag-gateway-service: # Go — ABAC matrix + retrieval orchestration + LLM
    build:
      context: ../../apps/services/rag-gateway-service
    environment:
      PORT: "8081"
    ports: ["8081:8081"]
    depends_on: [ingestion-retrieval-service]
    restart: unless-stopped

  # --- microfrontends -------------------------------------------------------

  ragapp: # Next.js remote (RAG/LLM/AI), mounted by mainapp under /rag
    build:
      context: ../..
      dockerfile: apps/web/ragapp/Dockerfile
    ports: ["3015:3001"] # host 3015 -> container 3001
    restart: unless-stopped

  mainapp: # Next.js host; proxies /rag to ragapp
    build:
      context: ../..
      dockerfile: apps/web/mainapp/Dockerfile
      args:
        # baked into the rewrite at build time (Next resolves rewrites then)
        RAG_APP_URL: http://ragapp:3001
    ports: ["3013:3000"] # host 3013 -> container 3000
    depends_on: [ragapp]
    restart: unless-stopped

  # --- gateway / trust boundary --------------------------------------------

  gateway: # KrakenD — authN, strip+inject identity, route, rate-limit
    image: devopsfaith/krakend:2.7
    ports: ["8080:8080"]
    volumes: ["../gateway:/etc/krakend:ro"]
    command: ["run", "-c", "/etc/krakend/krakend.json"]
    depends_on: [auth-service, rag-gateway-service]
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
  auth_pg_data:
  auth_redis_data:
