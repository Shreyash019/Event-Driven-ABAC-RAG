services:
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant_data:/qdrant/storage"]

  redis:
    image: redis:latest
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]

  # API gateway / ABAC trust boundary. Reaches host-run services (nx serve) via
  # host.docker.internal; see infra/gateway/README.md.
  gateway:
    image: devopsfaith/krakend:2.7
    ports: ["8080:8080"]
    volumes: ["../gateway:/etc/krakend:ro"]
    command: ["run", "-c", "/etc/krakend/krakend.json"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on: [redis, qdrant]

volumes:
  qdrant_data:
  redis_data: